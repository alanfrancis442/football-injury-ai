# configs/experiments/module1/tcn_ablation.yaml
#
# Stage 1 — TCN Temporal Ablation
# ────────────────────────────────
# Same ANUBIS setup as the clean transformer baseline, but replaces the
# temporal Transformer with a dilated TCN to test whether local temporal
# boundaries are modelled more reliably for pause/action transitions.

experiment:
  group: module1
  name: tcn_ablation
  seed: 42

data:
  anubis_dir: data/anubis/
  train_features: trn_features_cleaned.npy
  train_labels: trn_labels_cleaned.npy
  val_features: val_features_cleaned.npy
  val_labels: val_labels_cleaned.npy
  has_separate_val: true
  val_split: 0.15
  num_classes: 102
  num_joints: 32
  clip_frames: 60
  seq_len: 60

model:
  in_features: 9
  gat_hidden_dim: 64
  gat_heads: 4
  gat_dropout: 0.051065527924036666
  d_model: 128
  nhead: 4
  num_transformer_layers: 2
  dim_feedforward: 256
  transformer_dropout: 0.22439178858315353
  cls_std: 0.02
  temporal_backbone: tcn
  positional_encoding: learned
  num_tcn_layers: 4
  tcn_kernel_size: 3
  tcn_dropout: 0.15
  tcn_dilation_growth: 2

training:
  epochs: 80
  batch_size: 64
  learning_rate: 0.0012
  weight_decay: 0.0002
  warmup_epochs: 5
  grad_clip_norm: 1.0
  label_smoothing: 0.04
  save_every_n_epochs: 10

augmentation:
  enabled: true
  flip_prob: 0.35
  joint_jitter_std: 0.002
  speed_perturb: false
  speed_range: [0.9, 1.1]
  time_mask_frames: 4
  joint_drop_prob: 0.08

live:
  min_confidence: 0.40
  min_margin: 0.08
  min_motion_energy: 0.015
  hysteresis_frames: 3
  max_missing_frames: 8

paths:
  checkpoint_dir: outputs/checkpoints
  log_dir: outputs/logs

optuna:
  enabled: false
  study_name: anubis_pretrain_hpo_tcn
  direction: maximize
  n_trials: 30
  timeout_sec: null
  trial_epochs: 25
  seed: 42
  num_workers: 4
  pin_memory: true
  storage: null
  load_if_exists: true
  output_best_params: optuna_best_params.yaml
  output_best_config: pretrain_optuna_best.yaml
  search_space:
    learning_rate:
      low: 0.0001
      high: 0.002
      log: true
    weight_decay:
      low: 0.00001
      high: 0.001
      log: true
    label_smoothing:
      low: 0.0
      high: 0.15
    gat_dropout:
      low: 0.05
      high: 0.35
    transformer_dropout:
      low: 0.05
      high: 0.35
    flip_prob:
      low: 0.1
      high: 0.6
    joint_jitter_std:
      low: 0.001
      high: 0.02
      log: true
    speed_perturb:
      choices: [true, false]

# Module 1 Configuration

# Data paths
data:
  football_root: data/football
  raw_videos: data/football/raw
  clips: data/football/clips
  annotations: data/football/annotations/annotations.csv
  poses: data/football/poses
  features: data/football/features

# Pose estimation
pose:
  backend: mediapipe  # mediapipe | vitpose
  model: lite        # lite | full
  num_keypoints: 33
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

# Model configuration
model:
  # Approach A: GNN + TCN
  gnn:
    hidden_dim: 128
    num_layers: 4
    num_heads: 4
    dropout: 0.1
    edge_type: spatial  # spatial | kinematic
  
  temporal:
    type: tcn  # tcn | transformer
    hidden_dim: 128
    num_layers: 3
    kernel_size: 3
    dropout: 0.1

  # Approach B: GNN + Transformer (alternative)
  transformer:
    hidden_dim: 128
    num_layers: 3
    num_heads: 4
    dropout: 0.1
    use_rope: false

# Training
training:
  batch_size: 32
  num_epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_patience: 15

# Data splits
splits:
  train: 0.7
  val: 0.15
  test: 0.15
  split_by: source_video  # source_video | player | match

# Labels
labels:
  num_actions: 11
  num_risk_patterns: 10
  num_body_regions: 11

# Evaluation
evaluation:
  metrics:
    - false_positives_per_minute
    - precision_at_recall
    - action_f1
    - risk_pattern_f1
    - body_region_f1
  
  confidence_threshold: 0.7

# Hardware
hardware:
  device: cuda
  num_workers: 4
  pin_memory: true

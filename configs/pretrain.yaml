# configs/pretrain.yaml
#
# Stage 1 — ANUBIS Pretraining Hyperparameters
# ─────────────────────────────────────────────
# All hyperparameters for pretraining the SpatioTemporalEncoder on the ANUBIS
# action-recognition dataset (102 classes, 32 joints, pelvis-centred).
# Fine-tuning / inference values belong in configs/module1.yaml.
# Never hardcode any of these values inside Python files.

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  anubis_dir:         data/anubis/

  # File names inside anubis_dir (produced by your preprocessing notebook).
  # Shape convention: features (N, 6, 60, 32) — (samples, channels, frames, joints)
  #                   channels = [x, y, z, vx, vy, vz] (pelvis-centred, vel pre-computed)
  #                   labels   (N,) — integer class index in [0, 101]
  train_features:     trn_features_cleaned.npy
  train_labels:       trn_labels_cleaned.npy
  val_features:       val_features_cleaned.npy   # only used when has_separate_val=true
  val_labels:         val_labels_cleaned.npy

  has_separate_val:   true    # using separate val files
  val_split:          0.15    # fraction of training set used for val when has_separate_val=false

  num_classes:        102     # ANUBIS action categories
  num_joints:         32
  clip_frames:        60      # T stored in the .npy file
  seq_len:            60      # frames fed to the model; must be <= clip_frames
                              # if seq_len < clip_frames a random window is cropped

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  in_features:           9    # pos(3) + vel(3) + acc(3) per joint
  gat_hidden_dim:       64    # output width of every GAT block (heads × per_head_dim)
  gat_heads:             4    # multi-head attention (first two GAT layers)
  gat_dropout:         0.2
  d_model:             128    # transformer embedding width
  nhead:                 4    # transformer attention heads
  num_transformer_layers: 2
  dim_feedforward:     256
  transformer_dropout: 0.2
  cls_std:            0.02    # trunc_normal std for CLS-token initialisation

# ── Training ──────────────────────────────────────────────────────────────────
training:
  epochs:              120
  batch_size:           64
  learning_rate:      0.0005
  weight_decay:      0.0005
  warmup_epochs:         5    # linear LR warm-up before cosine decay
  grad_clip_norm:      1.0
  label_smoothing:    0.05    # applied to CrossEntropyLoss
  save_every_n_epochs:  10

# ── Augmentation ──────────────────────────────────────────────────────────────
augmentation:
  enabled:            true
  flip_prob:          0.3     # probability of left-right joint flip per sample
  joint_jitter_std:  0.005    # Gaussian noise σ added to all coordinates
  speed_perturb:     false    # temporal speed perturbation
  speed_range:        [0.8, 1.2]   # [min_factor, max_factor] for temporal stretch

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  checkpoint_dir:  outputs/checkpoints/pretrain/
  log_dir:         outputs/logs/

# ── Optuna Hyperparameter Search ──────────────────────────────────────────────
optuna:
  enabled:          false
  study_name:       anubis_pretrain_hpo
  direction:        maximize
  n_trials:         30
  timeout_sec:      null
  trial_epochs:     25
  seed:             42
  num_workers:      4
  pin_memory:       true
  storage:          null
  load_if_exists:   true

  output_best_params: outputs/logs/optuna_best_params.yaml
  output_best_config: outputs/logs/pretrain_optuna_best.yaml

  # Optional overrides for sampling ranges
  search_space:
    learning_rate:
      low: 0.0001
      high: 0.002
      log: true
    weight_decay:
      low: 0.00001
      high: 0.001
      log: true
    label_smoothing:
      low: 0.0
      high: 0.15
    gat_dropout:
      low: 0.05
      high: 0.35
    transformer_dropout:
      low: 0.05
      high: 0.35
    flip_prob:
      low: 0.1
      high: 0.6
    joint_jitter_std:
      low: 0.001
      high: 0.02
      log: true
    speed_perturb:
      choices: [true, false]
